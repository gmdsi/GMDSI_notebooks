name: notebook ci

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - "**"

jobs:

  # ── Part 0 notebooks (no inter-dependencies, no executables needed for most) ──
  part0:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    name: part0-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: gmdsitut
          create-args: python=3.11
          cache-downloads: true
          cache-environment: true

      - name: Add binaries to PATH
        shell: bash -l {0}
        run: |
          mkdir -p "$HOME/.local/bin"
          if [ "$RUNNER_OS" == "Windows" ]; then d="win"
          elif [ "$RUNNER_OS" == "macOS" ]; then d="mac"
          else d="linux"; fi
          cp bin_new/$d/* "$HOME/.local/bin/"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run part0 notebooks
        shell: bash -l {0}
        env:
          MPLBACKEND: Agg
        run: |
          python autotest/run_notebooks.py part0

  # ── Part 1 notebooks (mostly independent, only fosm depends on pilotpoints) ──
  part1:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    name: part1-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: gmdsitut
          create-args: python=3.11
          cache-downloads: true
          cache-environment: true

      - name: Add binaries to PATH
        shell: bash -l {0}
        run: |
          mkdir -p "$HOME/.local/bin"
          if [ "$RUNNER_OS" == "Windows" ]; then d="win"
          elif [ "$RUNNER_OS" == "macOS" ]; then d="mac"
          else d="linux"; fi
          cp bin_new/$d/* "$HOME/.local/bin/"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run part1 notebooks
        shell: bash -l {0}
        env:
          MPLBACKEND: Agg
        run: |
          python autotest/run_notebooks.py part1

  # ── Part 2 notebooks (run sequentially: setup -> mid -> final) ──
  part2:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    name: part2-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: gmdsitut
          create-args: python=3.11
          cache-downloads: true
          cache-environment: true

      - name: Add binaries to PATH
        shell: bash -l {0}
        run: |
          mkdir -p "$HOME/.local/bin"
          if [ "$RUNNER_OS" == "Windows" ]; then d="win"
          elif [ "$RUNNER_OS" == "macOS" ]; then d="mac"
          else d="linux"; fi
          cp bin_new/$d/* "$HOME/.local/bin/"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run part2 notebooks
        shell: bash -l {0}
        env:
          MPLBACKEND: Agg
        run: |
          python autotest/run_notebooks.py part2
